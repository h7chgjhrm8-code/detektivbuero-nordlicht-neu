<head>

<style>
:root{
  --bg:#071323; --panel:#10223b; --panel2:#172d4c; --line:#2d496f; --text:#f1f7ff; --muted:#a8bad1;
  --yellow:#ffd447; --blue:#54d5ff; --green:#6ee7a8; --red:#ff7182; --purple:#c49cff;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at 20% 0%,#18385f,#071323 45%,#030812);color:var(--text)}
button,input,select,textarea{font:inherit}
button{border:0;border-radius:15px;padding:12px 15px;background:var(--yellow);color:#171103;font-weight:900;box-shadow:0 5px 0 rgba(0,0,0,.25);cursor:pointer}
button:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.25)}
button.secondary{background:#233b60;color:var(--text);border:1px solid var(--line)}
button.ghost{background:transparent;color:var(--blue);border:1px solid var(--line);box-shadow:none}
button.choice{display:block;width:100%;text-align:left;background:#152a48;color:var(--text);border:1px solid var(--line);box-shadow:none;margin:9px 0}
button.choice.selected{outline:3px solid var(--blue);background:#1c3b61}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:#071426;color:var(--text);padding:12px 13px;outline:none}
textarea{min-height:110px}
.app{max-width:1050px;margin:0 auto;padding:15px}
.hero,.card{border:1px solid rgba(255,255,255,.08);background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.025));border-radius:24px;padding:18px;box-shadow:0 14px 50px rgba(0,0,0,.25)}
.hero{margin-top:8px;position:relative;overflow:hidden}
.hero:before{content:"";position:absolute;right:-110px;top:-140px;width:310px;height:310px;border-radius:50%;background:radial-gradient(circle,rgba(84,213,255,.22),transparent 65%)}
.logo{font-size:44px;animation:float 3.2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
h1{margin:5px 0 8px;font-size:33px} h2{margin:5px 0 12px;font-size:26px} h3{margin:10px 0 8px}
p{line-height:1.52}.muted{color:var(--muted)}.small{font-size:14px}
.grid{display:grid;gap:14px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.space{justify-content:space-between}
.pill{display:inline-flex;align-items:center;gap:6px;background:#0b1a30;border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:var(--muted);font-size:14px}
.badge{background:var(--yellow);color:#151000;border-radius:999px;padding:3px 8px;font-weight:900}
.topbar{position:sticky;top:0;z-index:10;margin:-15px -15px 14px;padding:10px 15px;background:rgba(7,19,35,.91);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.progress{height:9px;background:#06101e;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin-top:9px}.progress>div{height:100%;background:linear-gradient(90deg,var(--yellow),var(--blue));transition:.35s;width:0}
.story{font-size:18px;line-height:1.58;background:linear-gradient(135deg,#0e1e34,#142d4b);border-left:5px solid var(--yellow);border-radius:18px;padding:16px;margin:12px 0;animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.clue{border:1px dashed #537097;background:#071426;border-radius:16px;padding:13px;margin:10px 0}
.map{background:#06101e;border:1px solid var(--line);border-radius:18px;padding:10px;overflow:hidden;margin:12px 0}
.room{fill:#112743;stroke:#4a6a93;stroke-width:2}.room.active{fill:#205b72;stroke:var(--blue)}.room.hot{fill:#58344a;stroke:#ff88a0}.roomlabel{fill:#edf6ff;font-size:12px;font-weight:800}
.board{display:grid;gap:9px}.suspect{background:#0f2139;border:1px solid var(--line);border-radius:14px;padding:11px}.suspect.off{opacity:.55;text-decoration:line-through}.suspect.hot{border-color:var(--yellow);box-shadow:0 0 0 2px rgba(255,212,71,.12)}
.feedback{min-height:34px;margin-top:10px;font-weight:800}.good{color:var(--green)}.bad{color:var(--red)}
.notePanel{display:none;position:fixed;z-index:40;left:10px;right:10px;bottom:10px;max-width:1050px;margin:auto;max-height:82vh;overflow:auto;background:#08172a;border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:0 22px 80px rgba(0,0,0,.6)}
.notePanel.open{display:block;animation:slide .2s}@keyframes slide{from{opacity:.4;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.clueItem{background:#10233d;border:1px solid var(--line);border-radius:13px;padding:10px;margin:7px 0}
.phase{border-left:4px solid var(--blue);padding-left:10px;margin:12px 0}
.footer-space{height:88px}.shake{animation:shake .25s}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.spark{animation:spark .55s}@keyframes spark{0%,100%{box-shadow:0 0 0 rgba(255,212,71,0)}50%{box-shadow:0 0 30px rgba(255,212,71,.32)}}
@media(max-width:760px){.two,.three{grid-template-columns:1fr}h1{font-size:28px}.story{font-size:17px}.app{padding:12px}.topbar{margin:-12px -12px 14px;padding:9px 12px}}
</style>

let S={players:[],difficulty:"normal",caseId:null,step:0,points:100,hints:0,mistakes:0,elapsed:0,startedAt:0,timer:null,clues:[],notes:"",sound:false,selected:null,flags:{}};

const C={
schule:{title:"Fall 1: Die Projektakte mit dem Kaffeefleck",world:"Schule",style:"klassischer Detektivfall · Alibis · Zeitstrahl",map:"school",
intro:"Eigentlich sollte es ein ganz normaler Projekttag werden. Doch kurz vor der Präsentation ist die Mappe mit den Ideen verschwunden. Übrig geblieben sind nur ein Kaffeefleck, ein falscher Stundenplan und ein Hausmeister, der verdächtig oft sagt: „Ich hab ja nichts gesagt.“",
cast:["Herr Berger, Hausmeister: trocken, freundlich, sieht mehr als er zugibt.","Frau Weber: organisiert, aber heute auffällig nervös.","Lukas: redet schnell, wenn er unsicher ist.","Zoe: merkt sich Kleinigkeiten und liebt Ordnung.","Herr Stein: hatte als Letzter Zugang zum Materialraum."],
steps:[
{t:"1. Tatort: Der Materialraum",kind:"input",a:["projekt"],place:"Materialraum",clue:"Auf der Mappe stand wahrscheinlich PROJEKT.",story:"{team} betritt den Materialraum. Auf dem Tisch liegt nur noch ein abgerissener Klebezettel: „PRO_ EKT“. Daneben klebt ein winziger gelber Papierrest an einer Kaffeetasse. Frau Weber sagt: „Das war bestimmt ein Versehen.“ Herr Berger murmelt: „Ein Versehen mit Schuhgröße 42 vielleicht.“",task:"Welches Wort stand vermutlich auf dem Klebezettel?",h:["Setze den fehlenden Buchstaben ein.","Es geht um den Projekttag.","PROJEKT."]},
{t:"2. Die Uhr, die fünf Minuten falsch geht",kind:"input",a:["1310","13:10"],place:"Flur",clue:"Die Fluruhr geht fünf Minuten vor. Angezeigte 13:15 bedeuten echte 13:10.",story:"Auf dem Flur hängt eine Uhr. Sie zeigt 13:15. Zoe flüstert: „Die geht seit letzter Woche fünf Minuten vor. Ich weiß das, weil ich deswegen einmal fast zu früh zur Mathearbeit gekommen wäre. Schrecklich.“",task:"Welche echte Uhrzeit entspricht 13:15 auf dieser Uhr?",h:["Die Uhr geht vor, also zeigt sie zu viel an.","Ziehe fünf Minuten ab.","13:10."]},
{t:"3. Verdächtige sortieren",kind:"choice",a:"stein",place:"Büro",clue:"Herr Stein bleibt vorerst verdächtig: Zugang, passende Schuhgröße, kein klares Alibi.",story:"Ihr sammelt erste Hinweise: Zoe hatte keinen Schlüssel. Frau Weber trägt Schuhgröße 38. Lukas war laut Liste in der Sporthalle. Herr Stein hatte einen Schlüssel zum Materialraum und trägt laut verlorener Sporttasche Schuhgröße 42.",task:"Wer bleibt nach diesen Hinweisen am stärksten verdächtig?",choices:[["zoe","Zoe"],["weber","Frau Weber"],["lukas","Lukas"],["stein","Herr Stein"]],h:["Schlüssel ist wichtig.","Schuhgröße 42 passt zu Bergers Kommentar.","Herr Stein."]},
{t:"4. Drei Aussagen, ein Wackler",kind:"choice",a:"lukas",place:"Sporthalle",clue:"Lukas' Aussage wackelt: Die Sporthalle war abgeschlossen.",story:"Aussagenrunde: Frau Weber: „Ich sah Herrn Stein kurz nach 13 Uhr im Flur.“ Lukas: „Quatsch, da war er mit mir in der Sporthalle.“ Herr Berger: „Die Sporthalle war von 13:00 bis 13:30 abgeschlossen, weil ich den Schlüssel gesucht habe. Den hatte ich übrigens in meiner Jacke. Sagen Sie nichts.“",task:"Welche Aussage passt am schlechtesten zu den anderen Hinweisen?",choices:[["weber","Frau Weber"],["lukas","Lukas"],["berger","Herr Berger"],["alle","Alle passen"]],h:["Vergleiche Sporthalle und abgeschlossen.","Wenn die Halle zu war, ist Lukas' Aussage schwierig.","Lukas."]},
{t:"5. Der Kaffeefleck",kind:"input",a:["sekretariat"],place:"Sekretariat",clue:"Der Kaffeefleck riecht nach Vanillekaffee aus dem Sekretariat.",story:"Zoe riecht vorsichtig an der Tasse. „Vanillekaffee. Den gibt es nur im Sekretariat.“ Auf dem Boden liegt ein Bonbonpapier. Herr Berger sagt: „Vanillekaffee und Bonbonpapier. Das ist kein Verbrechen, das ist eine Pause.“",task:"Zu welchem Ort führt der Kaffeefleck?",h:["Vanillekaffee gibt es laut Text nur an einem Ort.","Dieser Ort ist nicht der Materialraum.","Sekretariat."]},
{t:"6. Entscheidung: Spur Kaffee oder Spur Schuh?",kind:"decision",place:"Flur",clue:"Entscheidungspunkt: Kaffee-Spur oder Schuh-Spur.",story:"Ihr habt zwei Spuren. Die Kaffee-Spur führt ins Sekretariat. Die Schuh-Spur führt zum Hinterausgang. Beides klingt wichtig. Beides klingt nach kalten Füßen, sagt Herr Berger.",task:"Welcher Spur folgt ihr zuerst?",choices:[["kaffee","Der Kaffee-Spur ins Sekretariat"],["schuh","Der Schuh-Spur zum Hinterausgang"]],effect:{kaffee:"Im Sekretariat findet ihr eine Notiz: „Mappe nur kurz verstecken, damit niemand die unfertige Version sieht.“",schuh:"Am Hinterausgang findet ihr nur Matsch und einen Abdruck. Der Abdruck passt zu mehreren Personen, hilft also nur begrenzt."}},
{t:"7. Der entscheidende Satz",kind:"input",a:["unfertig","unfertigeversion","unfertige"],place:"Sekretariat",clue:"Motiv: Jemand wollte die unfertige Version verstecken.",story:"Die Notiz aus dem Sekretariat ist halb zerknittert. Darauf steht: „Bitte noch nicht zeigen. Die Version ist unfertig. Wenn die anderen das sehen, wird es peinlich.“ Das klingt weniger nach Diebstahl und mehr nach Panik.",task:"Welches Wort beschreibt den Zustand der Mappe?",h:["Es steht direkt in der Notiz.","Nicht fertig.","unfertig."]},
{t:"8. Finale: Wer hat die Mappe versteckt?",kind:"choice",a:"weber",place:"Büro",clue:"Frau Weber versteckte die Mappe, weil sie die unfertige Version nicht zeigen wollte.",story:"Nun passt alles zusammen: Frau Weber war nervös, der Vanillekaffee führt ins Sekretariat, und die Notiz spricht von einer unfertigen Version. Herr Stein war eine falsche Fährte. Lukas hat Unsinn erzählt, aber eher aus Verwirrung als aus Schuld.",task:"Wer hat die Projektakte versteckt?",choices:[["stein","Herr Stein"],["lukas","Lukas"],["weber","Frau Weber"],["berger","Herr Berger"]],h:["Es ging nicht um Diebstahl, sondern ums Verstecken.","Vanillekaffee und Notiz sind wichtig.","Frau Weber."]},
{t:"9. Abschlusscode",kind:"input",a:["3810"],place:"Materialraum",clue:"Abschlusscode 3810.",story:"Die Mappe liegt in einer Kiste. Auf ihr steht: „Code = Schuhgröße der falschen Fährte + echte Minute der Fluruhr.“ Die falsche Fährte war Herr Stein mit Schuhgröße 42? Wartet. Zoe tippt auf die Tasse: „Nein, die falsche Fährte war Frau Webers Schuhgröße 38, weil alle auf Schuhe geguckt haben. Die echte Minute war 10.“",task:"Gebt den vierstelligen Code ein.",h:["Schuhgröße aus dem Verdächtigen-Hinweis: 38.","Echte Uhrzeit war 13:10, also Minute 10.","3810."]}
]},
ferien:{title:"Fall 2: Die Strandkarte der frechen Möwe",world:"Ferien",style:"Abenteuer · Karte · Symbole · Reihenfolge",map:"beach",
intro:"In den Ferien findet ihr am Strand eine alte Karte. Leider hat eine Möwe den wichtigsten Teil geklaut. Sie sitzt jetzt auf dem Kioskdach und sieht aus, als hätte sie gerade ein Verbrechen mit Pommes begangen.",
cast:["Möwe Käpt'n Keks: nicht vernehmungsfähig, aber sehr selbstbewusst.","Tilda vom Kiosk: kennt jeden am Strand und fast jede Pommesbestellung.","Opa Jan: erzählt gern alte Geschichten, manchmal sogar die richtige.","Ein fremdes Kind mit rotem Eimer: taucht immer dort auf, wo gerade ein Hinweis fehlt."],
steps:[
{t:"1. Der Fund im Sand",kind:"input",a:["leuchtturm"],place:"Strand",clue:"Die Karte beginnt am Leuchtturm.",story:"{team} findet eine feuchte Karte. Darauf steht: „Beginnt dort, wo nachts ein Auge über das Meer wacht.“ Daneben ist eine kleine Zeichnung: ein hoher Turm mit Lichtstrahlen. Eine Möwe schreit, als wollte sie sagen: „Ich wusste das natürlich längst.“",task:"An welchem Ort beginnt die Suche?",h:["Ein Auge über dem Meer ist bildlich gemeint.","Der Ort sendet Licht.","Leuchtturm."]},
{t:"2. Drei Muscheln, ein Muster",kind:"input",a:["16"],place:"Dünen",clue:"Muschelmuster ergibt 16.",story:"Neben dem Leuchtturm liegen Muscheln in Reihen: 2, 4, 8, ?. Tilda vom Kiosk sagt: „Wenn ihr das nicht schafft, verkaufe ich euch eine Trostpommes.“",task:"Welche Zahl passt in die Reihe?",h:["Die Zahlen verdoppeln sich.","8 mal 2.","16."]},
{t:"3. Die Windrose",kind:"choice",a:"west",place:"Leuchtturm",clue:"Die Karte führt zuerst nach Westen.",story:"Auf der Karte steht: „Gehe dorthin, wo die Sonne abends baden geht.“ Ein kleiner Pfeil zeigt auf eine Windrose. Opa Jan nickt bedeutungsvoll und sagt: „Früher wusste jede Socke, wo Westen ist.“",task:"In welche Richtung müsst ihr zuerst?",choices:[["nord","Norden"],["ost","Osten"],["sued","Süden"],["west","Westen"]],h:["Es geht um den Sonnenuntergang.","Die Sonne geht im Westen unter.","Westen."]},
{t:"4. Das Foto von gestern",kind:"input",a:["kiosk"],place:"Kiosk",clue:"Das Foto zeigt den Kiosk vor dem Sturm.",story:"Ihr findet ein altes Sofortbild. Darauf sieht man eine gestreifte Markise, einen Eisständer und ein Schild: „Heute: Sanddorn-Slush“. Auf der Karte steht: „Der Ort, der gestern noch gerade stand, zeigt heute schief zum Schatz.“ Am Strand ist nur ein Schild schief: das Kioskschild.",task:"Welcher Ort ist gemeint?",h:["Achte auf Markise, Eisständer und Sanddorn-Slush.","Das ist kein Leuchtturm.","Kiosk."]},
{t:"5. Die Möwen-Aussage",kind:"choice",a:"rotereimer",place:"Kiosk",clue:"Das Kind mit rotem Eimer hat den Kartenteil aufgehoben.",story:"Tilda berichtet: „Die Möwe hat den Kartenteil fallen lassen. Ein Kind mit rotem Eimer hob ihn auf. Es rannte nicht weg, sondern ging zu den Dünen. Sehr höflich für jemanden, der gerade in einem Abenteuer steckt.“",task:"Wer hat den fehlenden Kartenteil wahrscheinlich?",choices:[["moewe","Die Möwe"],["tilda","Tilda"],["rotereimer","Das Kind mit rotem Eimer"],["opa","Opa Jan"]],h:["Die Möwe ließ ihn fallen.","Jemand hob ihn auf.","Das Kind mit rotem Eimer."]},
{t:"6. Entscheidung: Direkt fragen oder beobachten?",kind:"decision",place:"Dünen",clue:"Entscheidung: Direkt fragen oder beobachten.",story:"Ihr seht das Kind mit dem roten Eimer bei den Dünen. Es wirkt nicht böse, eher so, als hätte es selbst ein Rätsel gefunden. Ihr könnt direkt fragen oder erst beobachten, wohin es schaut.",task:"Wie geht ihr vor?",choices:[["fragen","Freundlich fragen"],["beobachten","Erst beobachten"]],effect:{fragen:"Das Kind lächelt und gibt euch den Kartenteil. „Ich wollte nur wissen, ob ihr wirklich Detektive seid.“ Fair.",beobachten:"Ihr merkt: Es schaut ständig zu einem Holzpfosten mit drei eingeritzten Wellen. Danach gibt es euch den Kartenteil."}},
{t:"7. Drei Wellen am Pfosten",kind:"input",a:["3"],place:"Dünen",clue:"Drei eingeritzte Wellen am Holzpfosten.",story:"Auf dem Kartenteil ist ein Pfosten mit Wellen zu sehen. Am echten Pfosten erkennt ihr: Es sind genau drei Wellen eingeritzt. Darunter steht: „Zähle, was nicht rauscht.“ Das Meer rauscht. Die eingeritzten Wellen nicht.",task:"Wie viele stille Wellen zählt ihr?",h:["Nicht die echten Wellen zählen.","Die eingeritzten Wellen am Pfosten.","3."]},
{t:"8. Der Schatzort",kind:"input",a:["dunen","duene","düne","dünen"],place:"Dünen",clue:"Der Schatz liegt in den Dünen, nicht direkt am Wasser.",story:"Die vollständige Karte ergibt: Leuchtturm → Westen → Kiosk → drei stille Wellen → Ort, der trocken bleibt, wenn die Flut kommt. Direkt am Wasser wäre Unsinn. Sogar Käpt'n Keks die Möwe sieht beleidigt aus, weil sie das wusste.",task:"Wo liegt die Kiste?",h:["Der Ort bleibt trocken bei Flut.","Nicht der Strand am Wasser.","In den Dünen."]},
{t:"9. Finale: Das Muschelwort",kind:"input",a:["ferien"],place:"Dünen",clue:"Finalwort FERIEN.",story:"In der Kiste liegt kein Gold, sondern ein Holzschild mit sechs Muscheln. Auf jeder steht ein Buchstabe: F – E – R – I – E – N. Opa Jan sagt: „Schätze sind manchmal nur gute Geschichten. Und manchmal Kekse. Leider keine Kekse.“",task:"Welches Lösungswort steht auf den Muscheln?",h:["Lies die Buchstaben der Reihe nach.","Es passt zum Setting.","FERIEN."]}
]},
reiterhof:{title:"Fall 3: Der verschwundene Turnierpokal vom Ponyhof",world:"Reiterhof",style:"Spuren · Tiere · Reihenfolge · Beobachtung",map:"farm",
intro:"Auf dem Reiterhof Sonnenhuf soll ein kleines Turnier stattfinden. Doch der Pokal ist weg. Im Stall ist niemand wirklich panisch – außer Pony Krümel, das panisch nach Futter sucht. Das tut es allerdings immer.",
cast:["Pony Krümel: sehr klein, sehr hungrig, sehr überzeugt von sich.","Lena: hilft im Stall und achtet auf Ordnung.","Matti: wollte die Schleifen sortieren, hat aber Farben unterschätzt.","Frau Holm: Hofleiterin, ruhig, aber streng mit offenen Sattelkammern.","Hofhund Bruno: findet alles, außer wenn es direkt vor ihm liegt."],
steps:[
{t:"1. Der leere Pokaltisch",kind:"input",a:["pokal"],place:"Reitplatz",clue:"Der verschwundene Gegenstand ist der Pokal.",story:"{team} steht am Reitplatz. Auf dem Tisch liegt ein rundes Staubfeld, daneben eine Karte: „Hier stand der Stolz des Tages.“ Matti flüstert: „Vielleicht war es ein sehr stolzer Kuchen?“ Frau Holm schaut ihn nur an.",task:"Was ist verschwunden?",h:["Es geht um ein Turnier.","Auf dem Tisch stand etwas Rundes mit Fuß.","Der Pokal."]},
{t:"2. Die Schleifen-Reihenfolge",kind:"input",a:["grun","grün"],place:"Reitplatz",clue:"Nach Rot, Blau, Rot, Blau folgt Grün laut Sonderregel.",story:"An der Bande hängen Schleifen: Rot, Blau, Rot, Blau – und dann eine Lücke. Auf einem Zettel steht: „Nach zwei Runden kommt die Hoffarbe.“ Lena sagt: „Die Hoffarbe ist Grün. Das weiß sogar Krümel, wenn Grün essbar wäre.“",task:"Welche Farbe gehört in die Lücke?",h:["Nicht einfach Rot-Blau weiterdenken.","Der Zettel nennt eine Sonderregel.","Grün."]},
{t:"3. Hufspuren im Sand",kind:"choice",a:"krumel",place:"Stall",clue:"Die kleinen Hufspuren gehören zu Pony Krümel.",story:"Im Sand führen kleine Hufspuren vom Pokaltisch zum Stall. Große Pferde waren auf der Koppel. Krümel, das Pony, steht im Stall und kaut unschuldig. Zu unschuldig.",task:"Zu wem passen die kleinen Hufspuren?",choices:[["bruno","Hofhund Bruno"],["krumel","Pony Krümel"],["grosspferd","Ein großes Pferd"],["matti","Matti"]],h:["Hundespuren sind keine Hufspuren.","Die Spuren sind klein.","Pony Krümel."]},
{t:"4. Die vertauschte Decke",kind:"input",a:["lena"],place:"Sattelkammer",clue:"Lena bemerkte die falsche Decke zuerst.",story:"In der Sattelkammer hängt Krümels blaue Decke auf dem Haken von Pferd Bella. Lena sagt: „Das war vorhin noch richtig.“ Matti sagt: „Blau ist doch fast wie Braun.“ Niemand antwortet. Manchmal ist Schweigen pädagogisch wertvoll.",task:"Wer bemerkte die vertauschte Decke zuerst?",h:["Achte auf die direkte Aussage.","Matti verwechselt Farben eher.","Lena."]},
{t:"5. Wer hatte wann Zugang?",kind:"choice",a:"matti",place:"Sattelkammer",clue:"Matti war allein in der Sattelkammer, als die Schleifen sortiert wurden.",story:"Zeitliste: 14:00 Pokal noch auf dem Tisch. 14:05 Lena füttert draußen. 14:10 Matti sortiert Schleifen in der Sattelkammer. 14:15 Bruno jagt einen Tennisball. 14:20 Pokal fehlt. Krümel stand währenddessen im Stall, aber seine Boxentür war kurz offen.",task:"Wer hatte am ehesten Gelegenheit, etwas in der Sattelkammer zu verstecken?",choices:[["lena","Lena"],["matti","Matti"],["bruno","Bruno"],["frauholm","Frau Holm"]],h:["Lena war draußen.","Matti war in der Sattelkammer.","Matti."]},
{t:"6. Entscheidung: Ponyspur oder Schleifenspur?",kind:"decision",place:"Stall",clue:"Entscheidung: Ponyspur oder Schleifenspur.",story:"Ihr habt zwei Spuren: Krümels kleine Hufspuren und Mattis chaotische Schleifen. Krümel niest in eure Richtung. Das ist kein Hinweis, aber sehr überzeugend.",task:"Welche Spur verfolgt ihr zuerst?",choices:[["pony","Krümels Hufspuren"],["schleifen","Mattis Schleifenspur"]],effect:{pony:"Die Hufspuren führen nur zum Futtereimer. Krümel ist kein Dieb, sondern ein Snack-Experte.",schleifen:"Zwischen den Schleifen steckt ein Zettel: „Pokal sicher wegstellen, sonst fällt er runter.“ Das klingt nach einer gut gemeinten Aktion."}},

function beep(type="click"){if(!S.sound)return;try{const ctx=new(window.AudioContext||window.webkitAudioContext)(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type==="bad"?"sawtooth":type==="good"?"triangle":"sine";o.frequency.value=type==="bad"?140:type==="good"?700:360;g.gain.value=.04;o.start();setTimeout(()=>{o.stop();ctx.close()},type==="bad"?180:120)}catch(e){}}
function names(){let p=S.players;if(p.length===1)return p[0];if(p.length===2)return p[0]+" und "+p[1];return p.slice(0,-1).join(", ")+" und "+p[p.length-1]}
function fmt(s){let m=Math.floor(s/60),sec=s%60;return m+":"+String(sec).padStart(2,"0")}
function startScreen(){clearInterval(S.timer);app.innerHTML=`<section class="hero"><div class="logo">🕵️‍♀️🔎</div><h1>Detektivbüro Nordlicht</h1><p class="muted">Drei kindgerechte Fälle: Schule, Ferien und Reiterhof. Jeder Fall nutzt andere Rätselmechaniken und ist auf etwa 30 Minuten angelegt.</p><div class="grid two"><div class="card"><h3>Detektivteam</h3><input id="p1" placeholder="Name 1"><input id="p2" placeholder="Name 2 optional" style="margin-top:8px"><input id="p3" placeholder="Name 3 optional" style="margin-top:8px"><input id="p4" placeholder="Name 4 optional" style="margin-top:8px"><h3>Schwierigkeitsgrad</h3><select id="diff"><option value="leicht">Leicht</option><option value="normal" selected>Normal</option><option value="schwer">Schwer</option></select><label class="row small" style="margin-top:12px"><input id="snd" type="checkbox" style="width:auto"> Soundeffekte aktivieren</label></div><div class="card"><h3>Spielidee</h3><div class="phase"><b>Phase 1:</b> eigene Atmosphäre je Fall.</div><div class="phase"><b>Phase 2:</b> verschiedene Mechaniken: Alibi, Karte, Spuren, Entscheidungen.</div><div class="phase"><b>Phase 3:</b> GitHub-taugliche Ein-Datei-Web-App.</div><p class="muted small">Tipp: Auf iOS läuft die Datei am besten über GitHub Pages, nicht lokal aus „Dateien“.</p></div></div><button id="go" style="margin-top:14px;width:100%">Fälle öffnen</button></section>`;
go.onclick=()=>{let ps=[p1.value,p2.value,p3.value,p4.value].map(x=>x.trim()).filter(Boolean).slice(0,4);if(!ps.length){p1.classList.add("shake");setTimeout(()=>p1.classList.remove("shake"),300);return}S.players=ps;S.difficulty=diff.value;S.sound=snd.checked;beep();caseScreen()}}
function caseScreen(){app.innerHTML=`<div class="topbar row space"><b>Team: ${names()}</b><button class="secondary" onclick="startScreen()">Ändern</button></div><section class="hero"><h2>Wählt einen Fall</h2><p>Schwierigkeit: <span class="badge">${D[S.difficulty].name}</span> – ${D[S.difficulty].txt}</p><div class="grid three">${Object.entries(C).map(([id,c])=>`<div class="card"><h3>${c.title}</h3><p><span class="pill">${c.world}</span></p><p class="muted">${c.style}</p><p>${c.intro}</p><button onclick="startCase('${id}')">Diesen Fall starten</button></div>`).join("")}</div></section>`}
function startCase(id){S.caseId=id;S.step=0;S.points=100;S.hints=0;S.mistakes=0;S.elapsed=0;S.clues=[];S.notes="";S.flags={};S.startedAt=Date.now();clearInterval(S.timer);S.timer=setInterval(()=>{S.elapsed=Math.floor((Date.now()-S.startedAt)/1000);let t=$("#time");if(t)t.textContent=fmt(S.elapsed)},1000);beep("good");stepScreen()}
function cur(){return C[S.caseId].steps[S.step]}
function stepScreen(){let c=C[S.caseId],st=cur(),pct=Math.round(S.step/c.steps.length*100);S.selected=null;app.innerHTML=`<div class="topbar"><div class="row space"><b>${c.title}</b><span class="pill">⏱ <span id="time">${fmt(S.elapsed)}</span></span></div><div class="row space" style="margin-top:8px"><span class="pill">⭐ ${S.points}</span><span class="pill">💡 ${S.hints}</span><button class="ghost" onclick="openNotes()">📓 Notizbuch</button></div><div class="progress"><div style="width:${pct}%"></div></div></div><section class="card spark"><h2>${st.t}</h2><div class="story">${st.story.replaceAll("{team}",names())}</div>${mapHtml(c.map,st.place)}<div class="clue"><b>Auftrag:</b><br>${st.task}</div><div id="answer">${answerHtml(st)}</div><div class="row" style="margin-top:12px"><button onclick="check()">Prüfen</button><button class="secondary" onclick="hint()">💡 Hinweis</button><button class="ghost" onclick="openNotes()">📓 Notizbuch</button></div><div id="fb" class="feedback"></div></section><div class="footer-space"></div>`}
function answerHtml(st){if(st.kind==="input")return`<input id="inp" placeholder="Antwort eingeben" autocomplete="off">`;return st.choices.map(x=>`<button class="choice" onclick="sel('${x[0]}',this)">${x[1]}</button>`).join("")}
function sel(v,el){S.selected=v;document.querySelectorAll(".choice").forEach(b=>b.classList.remove("selected"));el.classList.add("selected");beep()}
function check(){let st=cur(),ok=false;if(st.kind==="input"){ok=st.a.map(norm).includes(norm(inp.value))}else if(st.kind==="choice"){ok=S.selected===st.a}else if(st.kind==="decision"){if(!S.selected){fb("Wählt zuerst eine Spur.",false);return}add(st.clue+" "+st.effect[S.selected]);S.points+=D[S.difficulty].bonus;fb(st.effect[S.selected]+"<br><br>Die Entscheidung wurde im Notizbuch notiert.",true);beep("good");setTimeout(next,1700);return}
if(ok){add(st.clue);S.points+=D[S.difficulty].bonus;fb("Richtig kombiniert. Der Hinweis landet im Notizbuch.",true);beep("good");setTimeout(next,1050)}else{S.mistakes++;S.points=Math.max(0,S.points-D[S.difficulty].mistake);let m=["Noch nicht ganz. Lest die Szene noch einmal genau.","Fast – aber ein Detail widerspricht noch.","Der Fall macht ein unschuldiges Gesicht. Sehr verdächtig."];fb(m[S.mistakes%m.length],false);beep("bad")}}
function fb(m,g){let f=$("#fb");f.innerHTML=m;f.className="feedback "+(g?"good":"bad")}
function hint(){let st=cur();st._h=st._h||0;let i=Math.min(st._h,st.h.length-1);st._h++;S.hints++;S.points=Math.max(0,S.points-D[S.difficulty].hint);fb("💡 "+st.h[i],true);beep()}
function add(x){if(x&&!S.clues.includes(x))S.clues.push(x)}
function next(){S.step++;if(S.step>=C[S.caseId].steps.length)endScreen();else stepScreen()}
function endScreen(){clearInterval(S.timer);let rank=S.points>=110&&S.elapsed<2100?"Meisterdetektivteam":S.points>=85?"Profi-Spürnasen":S.points>=60?"Clevere Ermittler":"Hartnäckige Nachwuchsdetektive";app.innerHTML=`<section class="hero"><div class="logo">🎉🕵️</div><h1>Fall gelöst!</h1><div class="story">${names()} haben den Fall abgeschlossen. Das Detektivbüro Nordlicht vergibt den Rang: <b>${rank}</b>.</div><div class="grid three"><div class="card"><h3>Punkte</h3><p>${S.points}</p></div><div class="card"><h3>Zeit</h3><p>${fmt(S.elapsed)}</p></div><div class="card"><h3>Hinweise</h3><p>${S.hints}</p></div></div><div class="row" style="margin-top:14px"><button onclick="caseScreen()">Weiteren Fall wählen</button><button class="secondary" onclick="openNotes()">Notizbuch ansehen</button></div></section>`;beep("good")}
function openNotes(){let c=S.caseId?C[S.caseId]:null;notes.innerHTML=`<div class="row space"><h2>📓 Notizbuch</h2><button class="secondary" onclick="notes.classList.remove('open')">Schließen</button></div>${c?`<div class="grid two"><div><h3>Fallfiguren</h3>${c.cast.map(x=>`<div class="clueItem">${x}</div>`).join("")}<h3>Gesammelte Hinweise</h3>${S.clues.length?S.clues.map(x=>`<div class="clueItem">${x}</div>`).join(""):"<p class='muted'>Noch keine Hinweise gesammelt.</p>"}</div><div><h3>Karte</h3>${mapHtml(c.map,cur()?.place||"")}</div></div>`:""}<h3>Eigene Notizen</h3><textarea id="own">${S.notes||""}</textarea><div class="row" style="margin-top:10px"><button onclick="S.notes=own.value;beep('good')">Speichern</button><button class="ghost" onclick="S.notes='';openNotes()">Leeren</button></div>`;notes.classList.add("open")}
function mapHtml(type,active){let rooms={school:[["Materialraum",8,10,95,50],["Büro",117,10,70,50],["Sekretariat",8,75,95,50],["Flur",117,75,120,35],["Sporthalle",8,140,100,50],["Hinterausgang",124,130,110,60]],beach:[["Leuchtturm",10,12,92,50],["Strand",118,12,118,50],["Kiosk",10,78,78,50],["Dünen",104,78,132,50],["Pfosten",10,145,78,42],["Wasser",104,145,132,42]],farm:[["Reitplatz",8,12,100,54],["Stall",124,12,105,54],["Sattelkammer",8,84,105,54],["Heuboden",128,84,101,54],["Koppel",8,154,105,38],["Futter",128,154,101,38]]}[type]||[];return`<div class="map"><svg viewBox="0 0 250 205" width="100%" height="210">${rooms.map(r=>`<rect class="room ${active&&active.toLowerCase().includes(r[0].toLowerCase())?'active':''}" x="${r[1]}" y="${r[2]}" width="${r[3]}" height="${r[4]}" rx="8"></rect><text class="roomlabel" x="${r[1]+7}" y="${r[2]+28}">${r[0]}</text>`).join("")}<path d="M60 66 L60 78 M158 66 L158 78 M70 138 L70 154 M176 138 L176 154" stroke="#ffd447" stroke-width="3" stroke-dasharray="5 5"/></svg></div>`}
window.onload=startScreen;
</script>
